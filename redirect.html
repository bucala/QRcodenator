<!doctype html>
<html lang="sk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QRcodenator redirect</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: #1d1d1f;
        background: #f5f5f7;
      }

      main {
        width: min(420px, calc(100vw - 32px));
        padding: 28px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 24px 80px rgba(20, 20, 30, 0.12);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: #6e6e73;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Presmerovanie...</h1>
      <p id="message">Overujem dynamicky QR kod.</p>
    </main>

    <script src="config.js"></script>
    <script type="module">
      const FIREBASE_VERSION = "12.14.0";

      async function loadFirebaseConfig() {
        if (window.QRCODENATOR_FIREBASE_CONFIG && window.QRCODENATOR_FIREBASE_CONFIG.apiKey) {
          return window.QRCODENATOR_FIREBASE_CONFIG;
        }
        try {
          const response = await fetch("firebase-config.local.json", { cache: "no-store" });
          if (response.ok) return response.json();
        } catch {
          // Optional local config is absent in production unless the deploy target provides it.
        }
        throw new Error("Firebase config chyba.");
      }

      function trackScan(slug, config) {
        const endpoint = window.QRCODENATOR_ANALYTICS_ENDPOINT || config.analyticsEndpoint;
        if (!endpoint) return;
        const body = JSON.stringify({ slug, at: new Date().toISOString() });
        if (navigator.sendBeacon) {
          navigator.sendBeacon(endpoint, new Blob([body], { type: "application/json" }));
          return;
        }
        fetch(endpoint, { method: "POST", headers: { "Content-Type": "application/json" }, body, keepalive: true }).catch(() => {});
      }

      const message = document.querySelector("#message");
      const params = new URLSearchParams(window.location.search);
      const slug = params.get("id");

      try {
        if (!slug || !/^[a-z0-9-]{1,64}$/.test(slug)) throw new Error("Neplatny QR identifikator.");

        const config = await loadFirebaseConfig();
        const [{ initializeApp }, firestore] = await Promise.all([
          import(`https://www.gstatic.com/firebasejs/${FIREBASE_VERSION}/firebase-app.js`),
          import(`https://www.gstatic.com/firebasejs/${FIREBASE_VERSION}/firebase-firestore.js`),
        ]);
        const app = initializeApp(config);
        const db = firestore.getFirestore(app);
        const ref = firestore.doc(db, "redirects", slug);
        const snap = await firestore.getDoc(ref);
        if (!snap.exists()) throw new Error("Dynamicky QR kod neexistuje.");

        const data = snap.data();
        if (!data.active || !/^https?:\/\//i.test(data.targetUrl || "")) throw new Error("Dynamicky QR kod nie je aktivny.");
        trackScan(slug, config);
        window.location.replace(data.targetUrl);
      } catch (error) {
        message.textContent = error.message || "Presmerovanie zlyhalo.";
      }
    </script>
  </body>
</html>
